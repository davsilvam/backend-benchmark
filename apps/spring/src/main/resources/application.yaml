spring:
  application:
    name: spring

  datasource:
    url: jdbc:postgresql://localhost:5432/benchmark
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  sql:
    init:
      mode: always

  threads:
    virtual:
      enabled: true

server:
  port: 8080

logging:
  level:
    root: ERROR
    org.springframework: ERROR
    org.hibernate: ERROR
